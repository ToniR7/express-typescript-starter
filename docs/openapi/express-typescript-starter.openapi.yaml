openapi: 3.2.0
info:
  title: express-typescript-starter
  version: 1.0.0
  description: production-ready node.js boilerplate built with typescript and express
servers:
  - url: http://localhost:5010
    description: Development server
  - url: http://express-typescript-starter:5010
    description: Production Server
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Health check endpoint
      description: Returns the health status of the API server
      tags:
        - Healthz
      parameters: []
      responses:
        "200":
          description: Server is healthy and operational
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
components:
  schemas:
    HealthzResponse:
      type: string
      const: OK
      description: Health check response indicating the server is operational
    Response:
      type: object
      properties:
        message:
          type: string
        params:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      required:
        - message
      additionalProperties: false
      description: Response schema for both success and error responses
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT based authentication
